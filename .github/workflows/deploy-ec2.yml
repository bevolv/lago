name: "Deploy to EC2"

on:
  push:
    branches:
      - deploy/ec2
  workflow_dispatch:

concurrency:
  group: deploy-ec2-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.LAGO_DOMAIN || 'lago.bevolv.co' }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            deploy/docker-compose.production.yml
            deploy/postgresql.conf

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Trust EC2 host key
        env:
          EC2_SSH_HOST: ${{ secrets.EC2_SSH_HOST }}
          EC2_KNOWN_HOSTS: ${{ vars.EC2_KNOWN_HOSTS }}
        run: |
          mkdir -p -m 700 ~/.ssh
          if [ -n "$EC2_KNOWN_HOSTS" ]; then
            echo "$EC2_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -H "$EC2_SSH_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Prepare remote deploy directory
        env:
          EC2_SSH_HOST: ${{ secrets.EC2_SSH_HOST }}
          EC2_SSH_USER: ${{ secrets.EC2_SSH_USER }}
          DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH || '/opt/lago' }}
        run: |
          ssh "$EC2_SSH_USER@$EC2_SSH_HOST" "
            sudo mkdir -p '$DEPLOY_PATH' '$DEPLOY_PATH/htpasswd' &&
            sudo chown -R \$(whoami):\$(whoami) '$DEPLOY_PATH'
          "

      - name: Upload compose file
        env:
          EC2_SSH_HOST: ${{ secrets.EC2_SSH_HOST }}
          EC2_SSH_USER: ${{ secrets.EC2_SSH_USER }}
          DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH || '/opt/lago' }}
        run: |
          scp deploy/docker-compose.production.yml \
            "$EC2_SSH_USER@$EC2_SSH_HOST:$DEPLOY_PATH/docker-compose.production.yml"
          scp deploy/postgresql.conf \
            "$EC2_SSH_USER@$EC2_SSH_HOST:$DEPLOY_PATH/postgresql.conf"

      - name: Write remote .env
        env:
          EC2_SSH_HOST: ${{ secrets.EC2_SSH_HOST }}
          EC2_SSH_USER: ${{ secrets.EC2_SSH_USER }}
          DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH || '/opt/lago' }}
          LAGO_DOMAIN: ${{ vars.LAGO_DOMAIN || 'lago.bevolv.co' }}
          LAGO_ACME_EMAIL: ${{ vars.LAGO_ACME_EMAIL }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          LAGO_ENCRYPTION_PRIMARY_KEY: ${{ secrets.LAGO_ENCRYPTION_PRIMARY_KEY }}
          LAGO_ENCRYPTION_DETERMINISTIC_KEY: ${{ secrets.LAGO_ENCRYPTION_DETERMINISTIC_KEY }}
          LAGO_ENCRYPTION_KEY_DERIVATION_SALT: ${{ secrets.LAGO_ENCRYPTION_KEY_DERIVATION_SALT }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          LAGO_RSA_PRIVATE_KEY: ${{ secrets.LAGO_RSA_PRIVATE_KEY }}
          LAGO_USE_AWS_S3: ${{ vars.LAGO_USE_AWS_S3 }}
          LAGO_AWS_S3_ACCESS_KEY_ID: ${{ secrets.LAGO_AWS_S3_ACCESS_KEY_ID }}
          LAGO_AWS_S3_SECRET_ACCESS_KEY: ${{ secrets.LAGO_AWS_S3_SECRET_ACCESS_KEY }}
          LAGO_AWS_S3_REGION: ${{ vars.LAGO_AWS_S3_REGION }}
          LAGO_AWS_S3_BUCKET: ${{ vars.LAGO_AWS_S3_BUCKET }}
          LAGO_AWS_S3_ENDPOINT: ${{ vars.LAGO_AWS_S3_ENDPOINT }}
          LAGO_FROM_EMAIL: ${{ vars.LAGO_FROM_EMAIL }}
          LAGO_SMTP_ADDRESS: ${{ vars.LAGO_SMTP_ADDRESS }}
          LAGO_SMTP_PORT: ${{ vars.LAGO_SMTP_PORT }}
          LAGO_SMTP_USERNAME: ${{ secrets.LAGO_SMTP_USERNAME }}
          LAGO_SMTP_PASSWORD: ${{ secrets.LAGO_SMTP_PASSWORD }}
          PORTAINER_USER: ${{ vars.PORTAINER_USER }}
          PORTAINER_PASSWORD: ${{ secrets.PORTAINER_PASSWORD }}
          DOZZLE_HOSTNAME: ${{ vars.DOZZLE_HOSTNAME }}
        run: |
          ssh "$EC2_SSH_USER@$EC2_SSH_HOST" "cat > '$DEPLOY_PATH/.env'" <<__LAGO_ENV__
          LAGO_DOMAIN=${LAGO_DOMAIN}
          LAGO_ACME_EMAIL=${LAGO_ACME_EMAIL}
          SECRET_KEY_BASE=${SECRET_KEY_BASE}
          LAGO_ENCRYPTION_PRIMARY_KEY=${LAGO_ENCRYPTION_PRIMARY_KEY}
          LAGO_ENCRYPTION_DETERMINISTIC_KEY=${LAGO_ENCRYPTION_DETERMINISTIC_KEY}
          LAGO_ENCRYPTION_KEY_DERIVATION_SALT=${LAGO_ENCRYPTION_KEY_DERIVATION_SALT}
          POSTGRES_USER=lago
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=lago
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=${REDIS_PASSWORD}
          LAGO_RSA_PRIVATE_KEY=${LAGO_RSA_PRIVATE_KEY}
          LAGO_USE_AWS_S3=${LAGO_USE_AWS_S3}
          LAGO_AWS_S3_ACCESS_KEY_ID=${LAGO_AWS_S3_ACCESS_KEY_ID}
          LAGO_AWS_S3_SECRET_ACCESS_KEY=${LAGO_AWS_S3_SECRET_ACCESS_KEY}
          LAGO_AWS_S3_REGION=${LAGO_AWS_S3_REGION}
          LAGO_AWS_S3_BUCKET=${LAGO_AWS_S3_BUCKET}
          LAGO_AWS_S3_ENDPOINT=${LAGO_AWS_S3_ENDPOINT}
          LAGO_FROM_EMAIL=${LAGO_FROM_EMAIL}
          LAGO_SMTP_ADDRESS=${LAGO_SMTP_ADDRESS}
          LAGO_SMTP_PORT=${LAGO_SMTP_PORT}
          LAGO_SMTP_USERNAME=${LAGO_SMTP_USERNAME}
          LAGO_SMTP_PASSWORD=${LAGO_SMTP_PASSWORD}
          PORTAINER_USER=${PORTAINER_USER}
          PORTAINER_PASSWORD=${PORTAINER_PASSWORD}
          DOZZLE_HOSTNAME=${DOZZLE_HOSTNAME}
          __LAGO_ENV__
          ssh "$EC2_SSH_USER@$EC2_SSH_HOST" "chmod 600 '$DEPLOY_PATH/.env'"

      - name: Write Dozzle credentials
        env:
          EC2_SSH_HOST: ${{ secrets.EC2_SSH_HOST }}
          EC2_SSH_USER: ${{ secrets.EC2_SSH_USER }}
          DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH || '/opt/lago' }}
          DOZZLE_USER: ${{ vars.DOZZLE_USER || 'admin' }}
          DOZZLE_PASSWORD: ${{ secrets.DOZZLE_PASSWORD || 'changeme' }}
        run: |
          HTPASSWD_LINE="${DOZZLE_USER}:$(openssl passwd -apr1 "$DOZZLE_PASSWORD")"
          ssh "$EC2_SSH_USER@$EC2_SSH_HOST" "cat > '$DEPLOY_PATH/htpasswd/dozzle'" <<< "$HTPASSWD_LINE"
          ssh "$EC2_SSH_USER@$EC2_SSH_HOST" "chmod 600 '$DEPLOY_PATH/htpasswd/dozzle'"

      - name: Deploy with Docker Compose
        env:
          EC2_SSH_HOST: ${{ secrets.EC2_SSH_HOST }}
          EC2_SSH_USER: ${{ secrets.EC2_SSH_USER }}
          DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH || '/opt/lago' }}
          DEPLOY_PROFILE: ${{ vars.EC2_DEPLOY_PROFILE || 'all' }}
          ENABLE_PORTAINER: ${{ vars.EC2_ENABLE_PORTAINER || 'false' }}
        run: |
          PROFILE_FLAGS="--profile $DEPLOY_PROFILE"
          if [ "$ENABLE_PORTAINER" = "true" ]; then
            PROFILE_FLAGS="$PROFILE_FLAGS --profile portainer"
          fi
          ssh "$EC2_SSH_USER@$EC2_SSH_HOST" "
            set -euo pipefail
            cd '$DEPLOY_PATH'
            docker compose -f docker-compose.production.yml --env-file .env $PROFILE_FLAGS pull
            docker compose -f docker-compose.production.yml --env-file .env $PROFILE_FLAGS up -d --remove-orphans --wait
            docker image prune -f
          "

      - name: External smoke test
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS "https://${{ vars.LAGO_DOMAIN || 'lago.bevolv.co' }}/api/health" && exit 0
            sleep 10
          done
          echo "::warning::External HTTPS check did not succeed after 5 attempts. On a brand-new domain this can be transient (DNS propagation / first Let's Encrypt issuance); re-run the job if the internal health checks above were green."
